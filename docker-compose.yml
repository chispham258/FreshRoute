services:
  app:
    build: .
    ports:
      - "8001:8001"
      - "3000:3000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - TEMPERATURE=0.1
      - DEFAULT_CONNECTOR=mock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]